<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="index.html">Taemok Oh</a>
    <nav class="site-nav">
      <a class="nav-link" href="index.html">Work</a>
      <a class="nav-link active" href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<div class="page-body">
  <main>
    <div class="contact-wrap">

      <!-- LEFT: heading -->
      <div>
        <h1 class="contact-heading">Get<br>in touch.</h1>
      </div>

      <!-- RIGHT: info -->
      <div class="contact-info">

        <div class="contact-block">
          <div class="contact-block-label">Email</div>
          <div class="contact-block-value">
            <a href="mailto:your@email.com">your@email.com</a>
          </div>
        </div>

        <div class="contact-block">
          <div class="contact-block-label">Based in</div>
          <div class="contact-block-value">Seoul, Korea</div>
        </div>

        <div class="contact-block">
          <div class="contact-block-label">Social</div>
          <div class="social-list">
            <a class="social-link" href="#" target="_blank" rel="noopener">Instagram</a>
            <a class="social-link" href="#" target="_blank" rel="noopener">Behance</a>
            <a class="social-link" href="#" target="_blank" rel="noopener">LinkedIn</a>
          </div>
        </div>

      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-text">© 2025</span>
      <span class="footer-text">Poster Works — Spring Semester</span>
    </div>
  </footer>
</div>

</body>
</html>
