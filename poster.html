<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="index.html">Taemok Oh</a>
    <nav class="site-nav">
      <a class="nav-link active" href="index.html">Work</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<div class="page-body">
  <main id="main-content"></main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-text">© 2025</span>
      <span class="footer-text">Poster Works — Spring Semester</span>
    </div>
  </footer>
</div>

<script src="data.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const id      = Number(params.get('id'));
  const poster  = posters.find(p => p.id === id);
  const main    = document.getElementById('main-content');

  if (!poster) {
    main.innerHTML = `<div class="not-found">Poster not found.</div>`;
  } else {
    document.title = `${poster.title} — Portfolio`;

    const hasImg   = poster.imageUrl;
    const hasDesc  = poster.description && poster.description.trim();
    const hasStory = poster.story && poster.story.trim();
    const hasTags  = poster.tags && poster.tags.length;

    main.innerHTML = `
      <div class="detail-wrap">
        <a class="back-link" href="index.html">← Back to Work</a>

        <div class="detail-header">
          <h1 class="detail-title">${poster.title}</h1>
          <div class="detail-meta">
            <span>${poster.creator}</span>
            <span>${poster.year}</span>
            <span>${poster.category}</span>
            <span>${poster.medium}</span>
            <span>${poster.dimensions}</span>
          </div>
          ${hasTags ? `
          <div class="detail-tags">
            ${poster.tags.map(t => `<span class="detail-tag">${t}</span>`).join('')}
          </div>` : ''}
        </div>

        ${hasImg ? `
        <div class="detail-poster-wrap">
          <div class="detail-poster">
            <img src="${poster.imageUrl}" alt="${poster.title}" />
          </div>
        </div>` : ''}

        ${hasDesc || hasStory ? `
        <div class="detail-body">
          ${hasDesc ? `<p class="detail-desc">${poster.description}</p>` : ''}
          ${hasStory ? `<p class="detail-story">${poster.story}</p>` : ''}
        </div>` : ''}
      </div>
    `;
  }
</script>

</body>
</html>
